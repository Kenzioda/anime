<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoAnime - Quality Streaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #ffdd95; --bg: #0b0b0b; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; }
        .aspect-poster { aspect-ratio: 2/3; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .active-ep { background: var(--primary) !important; color: black !important; }
        iframe { background: black; border-radius: 12px; }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="sticky top-0 z-50 bg-[#0b0b0b]/90 backdrop-blur-md border-b border-white/5">
        <div class="container mx-auto px-4 py-4 flex flex-wrap items-center justify-between gap-4">
            <h1 onclick="location.reload()" class="text-2xl font-black text-[#ffdd95] cursor-pointer italic tracking-tighter">
                GO<span class="text-white">ANIME</span>
            </h1>
            
            <div class="flex-1 max-w-md relative">
                <input type="text" id="search" placeholder="Search anime..." 
                    class="w-full bg-[#1a1a1a] border border-white/10 rounded-full py-2 px-5 pl-11 text-sm focus:ring-1 focus:ring-[#ffdd95] outline-none">
                <i class="fa fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <!-- Grid Section -->
        <div id="mainView">
            <h2 id="gridTitle" class="text-xl font-bold mb-6 flex items-center gap-2">
                <span class="w-1 h-6 bg-[#ffdd95] rounded-full"></span> Recent Releases
            </h2>
            <div id="animeGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">
                <!-- Skeleton -->
                <div class="animate-pulse bg-white/5 aspect-poster rounded-xl"></div>
                <div class="animate-pulse bg-white/5 aspect-poster rounded-xl"></div>
                <div class="animate-pulse bg-white/5 aspect-poster rounded-xl"></div>
            </div>
        </div>

        <!-- Player Section -->
        <div id="playerView" class="hidden">
            <button onclick="closePlayer()" class="mb-6 text-gray-400 hover:text-white flex items-center gap-2 text-sm">
                <i class="fa fa-arrow-left"></i> Back to Home
            </button>
            
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
                <div class="lg:col-span-3">
                    <div class="aspect-video w-full shadow-2xl">
                        <iframe id="videoFrame" class="w-full h-full" allowfullscreen frameborder="0"></iframe>
                    </div>
                    <div class="mt-6 bg-[#161616] p-6 rounded-2xl border border-white/5">
                        <h2 id="infoTitle" class="text-2xl font-bold mb-2"></h2>
                        <p id="infoDesc" class="text-gray-400 text-sm leading-relaxed"></p>
                    </div>
                </div>
                
                <div class="lg:col-span-1">
                    <div class="bg-[#161616] rounded-2xl border border-white/5 overflow-hidden">
                        <div class="p-4 border-b border-white/5 font-bold">Episodes</div>
                        <div id="epList" class="grid grid-cols-4 gap-2 p-4 max-h-[500px] overflow-y-auto"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Using a reliable public instance of Consumet API
        const API = "https://consumet-api-production-e852.up.railway.app/anime/gogoanime";

        async function fetchHome() {
            try {
                const res = await fetch(`${API}/recent-episodes`);
                const data = await res.json();
                renderGrid(data.results);
            } catch (e) {
                console.error("Home load failed", e);
            }
        }

        async function searchAnime(query) {
            document.getElementById('gridTitle').innerText = `Results for: ${query}`;
            const res = await fetch(`${API}/${query}`);
            const data = await res.json();
            renderGrid(data.results);
        }

        function renderGrid(list) {
            const grid = document.getElementById('animeGrid');
            grid.innerHTML = list.map(item => `
                <div class="group cursor-pointer" onclick="loadDetails('${item.id}')">
                    <div class="relative aspect-poster rounded-xl overflow-hidden mb-2">
                        <img src="${item.image}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                        <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition">
                            <i class="fa fa-play text-white text-3xl"></i>
                        </div>
                    </div>
                    <p class="text-sm font-medium line-clamp-2">${item.title}</p>
                </div>
            `).join('');
        }

        async function loadDetails(id) {
            document.getElementById('mainView').classList.add('hidden');
            document.getElementById('playerView').classList.remove('hidden');
            
            const res = await fetch(`${API}/info/${id}`);
            const data = await res.json();
            
            document.getElementById('infoTitle').innerText = data.title;
            document.getElementById('infoDesc').innerText = data.description || "No description available.";
            
            const epContainer = document.getElementById('epList');
            epContainer.innerHTML = data.episodes.map(ep => `
                <button onclick="playEp('${ep.id}', this)" class="bg-white/5 hover:bg-white/10 py-2 rounded text-xs transition">
                    ${ep.number}
                </button>
            `).join('');

            if(data.episodes.length > 0) playEp(data.episodes[0].id, epContainer.children[0]);
        }

        async function playEp(epId, btn) {
            document.querySelectorAll('#epList button').forEach(b => b.classList.remove('active-ep'));
            btn.classList.add('active-ep');

            const res = await fetch(`${API}/watch/${epId}`);
            const data = await res.json();
            
            // Consumet returns M3U8, we use an embed player for ease of use
            const stream = data.headers.Referer || "";
            // Most reliable way for simple sites: Use the provided embed link
            document.getElementById('videoFrame').src = data.sources[0].url.includes('m3u8') 
                ? `https://artplayer.org/?url=${encodeURIComponent(data.sources[0].url)}`
                : data.sources[0].url;
        }

        function closePlayer() {
            document.getElementById('mainView').classList.remove('hidden');
            document.getElementById('playerView').classList.add('hidden');
            document.getElementById('videoFrame').src = "";
        }

        document.getElementById('search').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') searchAnime(e.target.value);
        });

        window.onload = fetchHome;
    </script>
</body>
</html>
