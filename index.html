<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoAnime - Quality Streaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #ffdd95; --bg: #0b0b0b; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .aspect-poster { aspect-ratio: 2/3; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .active-ep { background: var(--primary) !important; color: black !important; font-weight: bold; }
        iframe { background: black; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .custom-loader { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .provider-btn.active { border-color: var(--primary); color: var(--primary); }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="sticky top-0 z-50 bg-[#0b0b0b]/90 backdrop-blur-md border-b border-white/5">
        <div class="container mx-auto px-4 py-4 flex flex-wrap items-center justify-between gap-4">
            <div class="flex items-center gap-6">
                <h1 onclick="window.location.reload()" class="text-2xl font-black text-[#ffdd95] cursor-pointer italic tracking-tighter">
                    GO<span class="text-white">ANIME</span>
                </h1>
                
                <!-- Provider Toggle -->
                <div class="hidden md:flex bg-white/5 p-1 rounded-lg border border-white/10 text-[10px] uppercase font-bold tracking-widest">
                    <button onclick="switchProvider('gogo')" id="btn-gogo" class="provider-btn active px-3 py-1.5 rounded transition">Gogo</button>
                    <button onclick="switchProvider('aniwatch')" id="btn-aniwatch" class="provider-btn px-3 py-1.5 rounded transition">HiAnime</button>
                </div>
            </div>
            
            <div class="flex-1 max-w-md relative">
                <input type="text" id="search" placeholder="Search anime..." 
                    class="w-full bg-[#1a1a1a] border border-white/10 rounded-full py-2 px-5 pl-11 text-sm focus:ring-1 focus:ring-[#ffdd95] outline-none transition-all">
                <i class="fa fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <!-- Error Message -->
        <div id="errorMessage" class="hidden bg-red-500/10 border border-red-500/50 text-red-200 p-4 rounded-xl mb-6 text-center text-sm">
            Failed to connect to API. Retrying with backup server...
        </div>

        <!-- Grid Section -->
        <div id="mainView">
            <h2 id="gridTitle" class="text-xl font-bold mb-6 flex items-center gap-2">
                <span class="w-1 h-6 bg-[#ffdd95] rounded-full"></span> Popular Now
            </h2>
            <div id="animeGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">
                <!-- Skeletons -->
                <div class="animate-pulse bg-white/5 aspect-poster rounded-xl"></div>
                <div class="animate-pulse bg-white/5 aspect-poster rounded-xl"></div>
                <div class="animate-pulse bg-white/5 aspect-poster rounded-xl"></div>
                <div class="animate-pulse bg-white/5 aspect-poster rounded-xl"></div>
                <div class="animate-pulse bg-white/5 aspect-poster rounded-xl"></div>
                <div class="animate-pulse bg-white/5 aspect-poster rounded-xl"></div>
            </div>
        </div>

        <!-- Player Section -->
        <div id="playerView" class="hidden">
            <button onclick="closePlayer()" class="mb-6 text-gray-400 hover:text-white flex items-center gap-2 text-sm transition">
                <i class="fa fa-arrow-left"></i> Back to Explore
            </button>
            
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
                <div class="lg:col-span-3">
                    <div class="aspect-video w-full shadow-2xl relative">
                        <div id="videoLoader" class="absolute inset-0 flex items-center justify-center bg-black z-10 hidden">
                            <div class="custom-loader"></div>
                        </div>
                        <iframe id="videoFrame" class="w-full h-full" allowfullscreen frameborder="0" referrerpolicy="no-referrer"></iframe>
                    </div>
                    <div class="mt-6 bg-[#161616] p-6 rounded-2xl border border-white/5">
                        <h2 id="infoTitle" class="text-2xl font-bold mb-2"></h2>
                        <div id="infoTags" class="flex gap-2 mb-4"></div>
                        <p id="infoDesc" class="text-gray-400 text-sm leading-relaxed"></p>
                    </div>
                </div>
                
                <div class="lg:col-span-1">
                    <div class="bg-[#161616] rounded-2xl border border-white/5 overflow-hidden">
                        <div class="p-4 border-b border-white/5 font-bold flex justify-between items-center">
                            <span>Episodes</span>
                            <span id="epTotal" class="text-xs text-gray-500"></span>
                        </div>
                        <div id="epList" class="grid grid-cols-4 gap-2 p-4 max-h-[500px] overflow-y-auto"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // CONFIGURATION
        const GOGO_MIRRORS = [
            "https://consumet-api-production-e852.up.railway.app/anime/gogoanime",
            "https://api.consumet.org/anime/gogoanime",
            "https://c.delusionz.xyz/anime/gogoanime"
        ];
        
        // PASTE YOUR OWN DEPLOYED ANIWATCH API URL HERE
        const ANIWATCH_URL = "https://your-aniwatch-api.koyeb.app/api/v2/hianime"; 

        let currentProvider = 'gogo';
        let currentMirrorIndex = 0;

        function switchProvider(p) {
            currentProvider = p;
            document.querySelectorAll('.provider-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${p}`).classList.add('active');
            fetchHome();
        }

        function getBaseUrl() {
            return currentProvider === 'gogo' ? GOGO_MIRRORS[currentMirrorIndex] : ANIWATCH_URL;
        }

        async function robustFetch(url) {
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error();
                const json = await response.json();
                // Normalize Aniwatch response which nests data in a 'data' object
                return currentProvider === 'aniwatch' ? json.data : json;
            } catch (err) {
                if (currentProvider === 'gogo' && currentMirrorIndex < GOGO_MIRRORS.length - 1) {
                    currentMirrorIndex++;
                    document.getElementById('errorMessage').classList.remove('hidden');
                    return robustFetch(url.replace(GOGO_MIRRORS[currentMirrorIndex-1], GOGO_MIRRORS[currentMirrorIndex]));
                }
                throw err;
            }
        }

        async function fetchHome() {
            const grid = document.getElementById('animeGrid');
            grid.innerHTML = '<div class="animate-pulse bg-white/5 aspect-poster rounded-xl"></div>'.repeat(6);
            
            try {
                let data;
                if (currentProvider === 'gogo') {
                    data = await robustFetch(`${getBaseUrl()}/top-airing`);
                    renderGrid(data.results);
                } else {
                    data = await robustFetch(`${getBaseUrl()}/home`);
                    renderGrid(data.spotlightAnimes.map(i => ({...i, title: i.name, image: i.poster})));
                }
                document.getElementById('errorMessage').classList.add('hidden');
            } catch (e) {
                grid.innerHTML = `<p class="col-span-full text-center py-20 text-gray-500">
                    ${currentProvider === 'aniwatch' ? 'Did you deploy your Aniwatch API yet? Check the URL in the code.' : 'All Gogo nodes busy.'}
                </p>`;
            }
        }

        async function searchAnime(query) {
            document.getElementById('gridTitle').innerText = `Results for: ${query}`;
            document.getElementById('animeGrid').innerHTML = '<div class="animate-pulse bg-white/5 aspect-poster rounded-xl"></div>'.repeat(6);
            try {
                const data = await robustFetch(`${getBaseUrl()}/${currentProvider === 'gogo' ? '' : 'search?q='}${encodeURIComponent(query)}`);
                const results = currentProvider === 'gogo' ? data.results : data.animes.map(i => ({...i, title: i.name, image: i.poster}));
                renderGrid(results);
            } catch(e) { console.error(e); }
        }

        function renderGrid(list) {
            const grid = document.getElementById('animeGrid');
            if(!list || list.length === 0) {
                grid.innerHTML = '<p class="col-span-full text-center py-20 text-gray-500">No anime found.</p>';
                return;
            }
            grid.innerHTML = list.map(item => `
                <div class="group cursor-pointer" onclick="loadDetails('${item.id}')">
                    <div class="relative aspect-poster rounded-xl overflow-hidden mb-2 shadow-lg">
                        <img src="${item.image}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500" loading="lazy">
                        <div class="absolute inset-0 bg-black/60 flex items-center justify-center opacity-0 group-hover:opacity-100 transition duration-300">
                            <div class="bg-[#ffdd95] text-black w-12 h-12 rounded-full flex items-center justify-center pl-1 shadow-2xl">
                                <i class="fa fa-play"></i>
                            </div>
                        </div>
                    </div>
                    <p class="text-sm font-semibold line-clamp-2 group-hover:text-[#ffdd95] transition">${item.title}</p>
                </div>
            `).join('');
        }

        async function loadDetails(id) {
            document.getElementById('mainView').classList.add('hidden');
            document.getElementById('playerView').classList.remove('hidden');
            document.getElementById('videoFrame').src = "";
            window.scrollTo(0,0);
            
            try {
                let data;
                if (currentProvider === 'gogo') {
                    data = await robustFetch(`${getBaseUrl()}/info/${id}`);
                } else {
                    const info = await robustFetch(`${getBaseUrl()}/anime/${id}`);
                    const eps = await robustFetch(`${getBaseUrl()}/anime/episodes/${id}`);
                    data = {
                        title: info.anime.info.name,
                        description: info.anime.info.description,
                        episodes: eps.episodes.map(e => ({ id: e.episodeId, number: e.number }))
                    };
                }
                
                document.getElementById('infoTitle').innerText = data.title;
                document.getElementById('infoDesc').innerHTML = data.description || "No description available.";
                document.getElementById('epTotal').innerText = `${data.episodes.length} Total`;
                
                const epContainer = document.getElementById('epList');
                epContainer.innerHTML = data.episodes.map(ep => `
                    <button id="ep-${ep.id}" onclick="playEp('${ep.id}', this)" class="bg-white/5 hover:bg-white/10 py-2 rounded text-xs transition border border-white/5">
                        ${ep.number}
                    </button>
                `).join('');

                if(data.episodes.length > 0) playEp(data.episodes[0].id, epContainer.firstElementChild);
            } catch (e) { console.error(e); }
        }

        async function playEp(epId, btn) {
            document.querySelectorAll('#epList button').forEach(b => b.classList.remove('active-ep'));
            btn.classList.add('active-ep');
            const loader = document.getElementById('videoLoader');
            loader.classList.remove('hidden');

            try {
                let videoUrl;
                if (currentProvider === 'gogo') {
                    const data = await robustFetch(`${getBaseUrl()}/watch/${epId}`);
                    videoUrl = (data.sources.find(s => s.quality === 'default') || data.sources[0]).url;
                } else {
                    // For Aniwatch, we have to pick a server (e.g., hd-1)
                    const data = await robustFetch(`${getBaseUrl()}/episode/sources?animeEpisodeId=${epId}&server=hd-1&category=sub`);
                    videoUrl = data.sources[0].url;
                }
                
                const playerFrame = document.getElementById('videoFrame');
                playerFrame.src = videoUrl.includes('.m3u8') ? `https://artplayer.org/?url=${encodeURIComponent(videoUrl)}` : videoUrl;
                playerFrame.onload = () => loader.classList.add('hidden');
            } catch (e) {
                loader.classList.add('hidden');
            }
        }

        function closePlayer() {
            document.getElementById('mainView').classList.remove('hidden');
            document.getElementById('playerView').classList.add('hidden');
            document.getElementById('videoFrame').src = "";
            fetchHome();
        }

        document.getElementById('search').addEventListener('keypress', (e) => {
            if(e.key === 'Enter' && e.target.value.trim()) searchAnime(e.target.value);
        });

        window.onload = fetchHome;
    </script>
</body>
</html>
